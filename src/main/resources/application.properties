spring.application.name=aistudyhub-be
# Port 8080 may be taken by Windows AgentService on some machines — override via SERVER_PORT in .env
server.port=${SERVER_PORT:8081}

spring.config.import=optional:file:.env[.properties]

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/aistudyhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:300000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_TIME:120000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:20000}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_batch_fetch_size=32
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# JWT & auth
app.jwt.secret=${JWT_SECRET:StudyHubAI-Dev-Secret-Key-Min-32-Chars-Long!!}
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-days=7
app.auth.max-failed-attempts=5
app.auth.lock-duration-minutes=15
app.auth.password-reset-expiration-minutes=30
app.auth.expose-reset-token-in-response=${EXPOSE_RESET_TOKEN:false}
app.auth.password-reset-frontend-url=${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}

# Mail (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@studyhub.local}}
app.mail.enabled=${MAIL_ENABLED:true}
app.admin.seed.enabled=true
app.admin.seed.email=${ADMIN_EMAIL:admin@studyhub.local}
app.admin.seed.password=${ADMIN_PASSWORD:Admin12345}
app.admin.seed.full-name=${ADMIN_FULL_NAME:StudyHub Admin}
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,https://*.trycloudflare.com
app.storage.upload-root=${UPLOAD_STORAGE_ROOT:uploads}
app.storage.avatar-dir=${AVATAR_STORAGE_DIR:uploads/avatars}
app.storage.document-dir=${DOCUMENT_STORAGE_DIR:uploads/documents}

# API performance (SCRUM-25)
app.cache.ttl-seconds=${CACHE_TTL_SECONDS:60}
app.cache.maximum-size=${CACHE_MAXIMUM_SIZE:500}
app.cache.slow-api-threshold-ms=${SLOW_API_THRESHOLD_MS:1500}

# AI providers: gemini or qwen.
app.ai.provider=${AI_PROVIDER:gemini}
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.0-flash-lite}
app.ai.gemini.fallback-models=${GEMINI_FALLBACK_MODELS:gemini-2.0-flash-lite,gemini-1.5-flash,gemini-flash-latest}
app.ai.gemini.temperature=${GEMINI_TEMPERATURE:0.3}
app.ai.gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:4096}
app.ai.gemini.timeout-seconds=${GEMINI_TIMEOUT_SECONDS:60}
app.ai.qwen.api-key=${QWEN_API_KEY:}
app.ai.qwen.base-url=${QWEN_BASE_URL:https://openrouter.ai/api/v1}
app.ai.qwen.model=${QWEN_MODEL:qwen/qwen3.6-flash}
app.ai.qwen.temperature=${QWEN_TEMPERATURE:0.3}
app.ai.qwen.max-output-tokens=${QWEN_MAX_OUTPUT_TOKENS:4096}
app.ai.qwen.timeout-seconds=${QWEN_TIMEOUT_SECONDS:60}

app.ai.openai.api-key=${OPENAI_API_KEY:}
app.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.ai.openai.model=${OPENAI_MODEL:gpt-4o-mini}
app.ai.openai.temperature=${OPENAI_TEMPERATURE:0.3}
app.ai.openai.max-output-tokens=${OPENAI_MAX_OUTPUT_TOKENS:4096}
app.ai.openai.timeout-seconds=${OPENAI_TIMEOUT_SECONDS:60}

# RAG — chunk, embed (Gemini), retrieve relevant context for chatbot
app.rag.enabled=${RAG_ENABLED:true}
app.rag.chunk-size=${RAG_CHUNK_SIZE:900}
app.rag.chunk-overlap=${RAG_CHUNK_OVERLAP:120}
app.rag.top-k=${RAG_TOP_K:4}
app.rag.max-chunks-per-document=${RAG_MAX_CHUNKS_PER_DOCUMENT:48}
app.rag.max-context-chars=${RAG_MAX_CONTEXT_CHARS:12000}
app.rag.embedding-model=${RAG_EMBEDDING_MODEL:gemini-embedding-001}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.enable-hateoas=false
springdoc.enable-data-rest=false

# Cloudinary
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:demo}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:demo}

# AWS S3 document storage
aws.region=${AWS_REGION:ap-southeast-2}
aws.s3.bucket=${AWS_S3_BUCKET:aistudyhub-documents}
aws.access-key=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
