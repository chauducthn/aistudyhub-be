spring.application.name=aistudyhub-be
server.port=8080

# H2 (dev)
spring.datasource.url=jdbc:h2:mem:studyhub;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT & auth
app.jwt.secret=${JWT_SECRET:StudyHubAI-Dev-Secret-Key-Min-32-Chars-Long!!}
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-days=7
app.auth.max-failed-attempts=5
app.auth.lock-duration-minutes=15
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.enable-hateoas=false
springdoc.enable-data-rest=false
