spring.application.name=aistudyhub-be
# Port 8080 may be taken by Windows AgentService on some machines — override via SERVER_PORT in .env
server.port=${SERVER_PORT:8081}

spring.config.import=optional:file:.env[.properties]

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/aistudyhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT & auth
app.jwt.secret=${JWT_SECRET:StudyHubAI-Dev-Secret-Key-Min-32-Chars-Long!!}
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-days=7
app.auth.max-failed-attempts=5
app.auth.lock-duration-minutes=15
app.auth.password-reset-expiration-minutes=30
app.auth.expose-reset-token-in-response=${EXPOSE_RESET_TOKEN:false}
app.auth.password-reset-frontend-url=${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}
app.admin.seed.enabled=true
app.admin.seed.email=${ADMIN_EMAIL:admin@studyhub.local}
app.admin.seed.password=${ADMIN_PASSWORD:Admin12345}
app.admin.seed.full-name=${ADMIN_FULL_NAME:StudyHub Admin}
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,https://*.trycloudflare.com
app.storage.upload-root=${UPLOAD_STORAGE_ROOT:uploads}
app.storage.avatar-dir=${AVATAR_STORAGE_DIR:uploads/avatars}
app.storage.document-dir=${DOCUMENT_STORAGE_DIR:uploads/documents}

# AI / Gemini
# AI_PROVIDER values: auto, local, gemini. auto uses Gemini only when GEMINI_API_KEY is configured.
app.ai.provider=${AI_PROVIDER:auto}
app.ai.fallback-to-local=${AI_FALLBACK_TO_LOCAL:true}
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
app.ai.gemini.temperature=${GEMINI_TEMPERATURE:0.3}
app.ai.gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:1024}
app.ai.gemini.timeout-seconds=${GEMINI_TIMEOUT_SECONDS:30}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.enable-hateoas=false
springdoc.enable-data-rest=false

# Cloudinary
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:demo}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:demo}
