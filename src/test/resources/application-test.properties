spring.config.import=optional:file:.env.test[.properties]

spring.datasource.url=${TEST_DB_URL:jdbc:mysql://127.0.0.1:3306/aistudyhub_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&createDatabaseIfNotExist=true}
spring.datasource.username=${TEST_DB_USERNAME:root}
spring.datasource.password=${TEST_DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

app.jwt.secret=StudyHubAI-Test-Secret-Key-Min-32-Chars-Long!!
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-days=7
app.auth.max-failed-attempts=5
app.auth.lock-duration-minutes=15
app.auth.expose-reset-token-in-response=true
app.admin.seed.enabled=false
app.admin.seed.email=admin@test.local
app.admin.seed.password=Admin12345
app.admin.seed.full-name=Test Admin
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.storage.upload-root=target/test-uploads
app.storage.avatar-dir=target/test-uploads/avatars
app.storage.document-dir=target/test-uploads/documents
app.ai.provider=local
app.ai.fallback-to-local=true
app.admin.metrics.cache-ttl-ms=0

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
